command: ["python", "app.py"]
env:
  - name: DATABRICKS_SCHEMA
    value: "virtue_foundation_dataset"
  - name: DATABRICKS_CATALOG
    value: "databricks_virtue_foundation_dataset_dais_2026"
  - name: FACILITIES_TABLE
    value: "facilities"
  - name: PINCODE_TABLE
    value: "india_post_pincode_directory"
  - name: NFHS_TABLE
    value: "nfhs_5_district_health_indicators"
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: DATABRICKS_SQL_USE_CLOUD_FETCH
    value: "false"
  - name: OPENAI_API_KEY
    valueFrom: secret
  - name: OPENAI_MODEL
    value: "gpt-4o"
  - name: OPENAI_SPELL_MODEL
    value: "gpt-4o-mini"
  - name: OPENAI_CHAT_MODEL
    value: "gpt-4o"
  - name: OPENAI_SEARCH_MODEL
    value: "gpt-4o"
  - name: OPENAI_TIMEOUT_SECONDS
    value: "12"
  - name: ENABLE_WEB_RESOLUTION
    value: "true"
  - name: OPENAI_REVIEW_MODEL
    value: "gpt-4o"
  - name: ENABLE_PUBLIC_REVIEW_ENRICHMENT
    value: "true"
  - name: PUBLIC_REVIEW_ENRICHMENT_LIMIT
    value: "8"
  - name: ENABLE_LEAFLET_MAP
    value: "true"
  - name: LEAFLET_TILE_URL
    value: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
  - name: ENABLE_TILE_MAP
    value: "false"
  - name: FACILITY_ROW_LIMIT
    value: "50000"
